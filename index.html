<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Meal Prep Coordinator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
  .macro { font-variant-numeric: tabular-nums; }
  details > summary { cursor: pointer; list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
  .recipe-body { white-space: pre-wrap; }
  .spinner { display:inline-block; width:1.1em; height:1.1em; border:2.5px solid currentColor; border-right-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align: -2px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .star-btn { transition: transform 0.1s; }
  .star-btn:active { transform: scale(0.85); }
  @media print { .no-print { display: none !important; } }
</style>
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen">

<nav class="bg-white border-b border-stone-200 sticky top-0 z-30 no-print">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
    <div class="flex items-center gap-2"><span class="text-2xl">&#x1F957;</span><h1 class="font-semibold text-lg">Meal Prep</h1></div>
    <div id="nav-links" class="flex items-center gap-1 text-sm flex-wrap"></div>
  </div>
</nav>

<main id="app" class="max-w-5xl mx-auto px-4 py-6"></main>

<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-stone-900 text-white px-4 py-2 rounded-lg shadow-lg opacity-0 transition-opacity pointer-events-none z-50"></div>

<script src="app.js"></script>
<script src="views.js"></script>
<script src="views2.js"></script>
</body>
</html>
