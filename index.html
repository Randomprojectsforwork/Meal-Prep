<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Meal Prep Coordinator</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>

    .no-print { display: none !important; }
  }

</head>
<body class="bg-stone-50 text-stone-900 min-h-screen">

<!-- ============================= NAV ============================= -->

  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="text-2xl">🥗</span>
      <h1 class="font-semibold text-lg">Meal Prep Coordinator</h1>
    </div>
    <div id="nav-links" class="flex items-center gap-1 text-sm"></div>
  </div>
</nav>

<main id="app" class="max-w-5xl mx-auto px-4 py-6"></main>

<!-- ============================= TOAST ============================= -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-stone-900 text-white px-4 py-2 rounded-lg shadow-lg opacity-0 transition-opacity pointer-events-none z-50"></div>

<script>
/* ========================================================================== */
/*  STATE                                                                     */
/* ========================================================================== */
const STORAGE_KEY = 'mealprep.v1';

const defaultState = () => ({
  apiKey: '',
  model: 'claude-sonnet-4-5',
  profiles: {
    a: {
      name: 'Person A',
      weightLbs: 220,
      gender: 'male',
      activity: 'Daily exercise 45 min + 10k steps',
      goal: 'Lose 1 lb/week',
      kcalTarget: 2400,
      proteinTarget: 330,
      carbRangeLow: 100,
      carbRangeHigh: 150,
      notes: 'Low-carb-friendly. Emphasize healthy fats. Higher protein.',
    },
    b: {
      name: 'Person B',
      weightLbs: 150,
      gender: 'female',
      activity: 'Runs 2-3x/wk + lifts 1-2x/wk + 10k steps',
      goal: 'Lose weight gradually',
      kcalTarget: 1700,
      proteinTarget: 130,
      carbRangeLow: 150,
      carbRangeHigh: 220,
      notes: 'Struggles on low-carb. Prefer meals with optional add-on carbs.',
    },
  },
  styleNotes: '',
  lastGeneration: null,   // { prompt, timestamp, meals: {breakfast:[], lunch:[], dinner:[], snack:[]} }
  picks: { breakfast: [], lunch: [], dinner: [], snack: [] },  // arrays of meal IDs
  finalPlan: null,        // set in review/shopping step
  checkedItems: {},       // shopping checkboxes
});

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    return { ...defaultState(), ...JSON.parse(raw) };
  } catch (e) {
    return defaultState();
  }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* ========================================================================== */
/*  ROUTER                                                                    */
/* ========================================================================== */
const routes = ['setup', 'generate', 'picks', 'share', 'review', 'shopping'];

function currentRoute() {
  const h = location.hash.replace(/^#/, '');
  const base = h.split('?')[0] || 'setup';
  return routes.includes(base) ? base : 'setup';
}

function routeParams() {
  // We do NOT use URLSearchParams here because LZString-encoded values can contain "+",
  // which URLSearchParams would interpret as a space. We treat values as raw strings.
  const h = location.hash;
  const qIdx = h.indexOf('?');
  if (qIdx < 0) return {};
  const params = {};
  h.slice(qIdx + 1).split('&').forEach((pair) => {
    if (!pair) return;
    const eq = pair.indexOf('=');
    if (eq < 0) params[pair] = '';
    else params[pair.slice(0, eq)] = pair.slice(eq + 1);
  });
  return params;
}

function go(route, params = {}) {
  // Raw concatenation — values from LZString.compressToEncodedURIComponent are already URI-safe
  // and re-encoding them would corrupt the "+" characters.
  const entries = Object.entries(params);
  const qs = entries.map(([k, v]) => `${k}=${v}`).join('&');
  location.hash = qs ? `${route}?${qs}` : route;
}

window.addEventListener('hashchange', render);

/* ========================================================================== */
/*  TOAST                                                                     */
/* ========================================================================== */
let toastTimer = null;
function toast(msg, ms = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => (el.style.opacity = '0'), ms);
}

/* ========================================================================== */
/*  UTIL                                                                      */
/* ========================================================================== */
const escapeHtml = (s) =>
  String(s ?? '').replace(/[&<>"']/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));

const round = (n, p = 0) => {
  const f = Math.pow(10, p);
  return Math.round(n * f) / f;
};

const uid = () => Math.random().toString(36).slice(2, 10);

function copyToClipboard(text) {
  return navigator.clipboard.writeText(text).then(
    () => toast('Copied to clipboard'),
    () => toast('Copy failed — select & copy manually')
  );
}

/* ========================================================================== */
/*  RENDER (top-level dispatch)                                               */
/* ========================================================================== */
function render() {
  // Detect incoming share link: #review?d=...
  const route = currentRoute();
  const params = routeParams();

  // Update nav active states
  renderNav(route);

  const app = document.getElementById('app');
  app.innerHTML = '';

  if (route === 'setup')    return renderSetup(app);
  if (route === 'generate') return renderGenerate(app);
  if (route === 'picks')    return renderPicks(app);
  if (route === 'share')    return renderShare(app);
  if (route === 'review')   return renderReview(app, params.d);
  if (route === 'shopping') return renderShopping(app);
}

function renderNav(active) {
  const links = [
    ['setup',    '1. Profiles'],
    ['generate', '2. Generate'],
    ['picks',    '3. Pick 3'],
    ['share',    '4. Share'],
    ['shopping', '5. Shopping'],
  ];
  document.getElementById('nav-links').innerHTML = links
    .map(([id, label]) => {
      const cls = id === active
        ? 'bg-emerald-100 text-emerald-900'
        : 'text-stone-600 hover:bg-stone-100';
      return `<a href="#${id}" class="px-3 py-1.5 rounded-md ${cls}">${label}</a>`;
    })
    .join('');
}

/* ========================================================================== */
/*  VIEW: SETUP / PROFILES                                                    */
/* ========================================================================== */
function renderSetup(root) {
  const p = state.profiles;
  root.innerHTML = `
    <div class="space-y-6">
      <header>
        <h2 class="text-2xl font-semibold">Setup</h2>
        <p class="text-stone-600 mt-1">Configure each person's profile and your Claude API key. Everything is stored in this browser only.</p>
      </header>

      <section class="bg-white p-5 rounded-lg border border-stone-200">
        <h3 class="font-semibold mb-3">Claude API</h3>
        <label class="block text-sm font-medium text-stone-700 mb-1">Anthropic API key</label>
        <input id="api-key" type="password" placeholder="sk-ant-..." value="${escapeHtml(state.apiKey)}"
          class="w-full px-3 py-2 border border-stone-300 rounded-md font-mono text-sm" />
        <p class="text-xs text-stone-500 mt-1">Stored in this browser's localStorage. Get one at console.anthropic.com.</p>

        <label class="block text-sm font-medium text-stone-700 mb-1 mt-4">Model</label>
        <select id="model" class="px-3 py-2 border border-stone-300 rounded-md text-sm">
          <option value="claude-sonnet-4-5" ${state.model==='claude-sonnet-4-5'?'selected':''}>claude-sonnet-4-5 (recommended)</option>
          <option value="claude-opus-4-6" ${state.model==='claude-opus-4-6'?'selected':''}>claude-opus-4-6 (slower, smarter)</option>
          <option value="claude-haiku-4-5" ${state.model==='claude-haiku-4-5'?'selected':''}>claude-haiku-4-5 (fastest)</option>
        </select>
      </section>

      ${profileCard('a', p.a, 'Person A')}
      ${profileCard('b', p.b, 'Person B')}

      <section class="bg-white p-5 rounded-lg border border-stone-200">
        <h3 class="font-semibold mb-3">Cooking style preferences (optional)</h3>
        <textarea id="style-notes" rows="3" placeholder="e.g., Mediterranean-leaning, easy bulk prep on Sundays, no shellfish, love spicy food..."
          class="w-full px-3 py-2 border border-stone-300 rounded-md text-sm">${escapeHtml(state.styleNotes)}</textarea>
      </section>

      <div class="flex gap-3">
        <button id="save-setup" class="px-5 py-2.5 bg-emerald-700 text-white rounded-md font-medium hover:bg-emerald-800">Save & continue</button>
        <button id="reset-state" class="px-5 py-2.5 bg-white border border-stone-300 text-stone-700 rounded-md hover:bg-stone-100">Reset all data</button>
      </div>
    </div>
  `;

  document.getElementById('save-setup').onclick = () => {
    state.apiKey = document.getElementById('api-key').value.trim();
    state.model = document.getElementById('model').value;
    state.styleNotes = document.getElementById('style-notes').value;
    ['a','b'].forEach((k) => {
      state.profiles[k] = readProfile(k);
    });
    saveState();
    toast('Saved');
    go('generate');
  };
  document.getElementById('reset-state').onclick = () => {
    if (!confirm('Wipe all data (profiles, API key, picks)?')) return;
    localStorage.removeItem(STORAGE_KEY);
    state = defaultState();
    render();
  };
}

function profileCard(key, p, fallback) {
  return `
    <section class="bg-white p-5 rounded-lg border border-stone-200">
      <h3 class="font-semibold mb-3">${escapeHtml(p.name || fallback)} — profile</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <label class="block text-sm">Name<br><input data-pf="${key}.name" value="${escapeHtml(p.name)}" class="w-full mt-1 px-3 py-2 border border-stone-300 rounded-md"></label>
        <label class="block text-sm">Weight (lbs)<br><input data-pf="${key}.weightLbs" type="number" value="${p.weightLbs}" class="w-full mt-1 px-3 py-2 border border-stone-300 rounded-md"></label>
        <label class="block text-sm">Activity<br><input data-pf="${key}.activity" value="${escapeHtml(p.activity)}" class="w-full mt-1 px-3 py-2 border border-stone-300 rounded-md"></label>
        <label class="block text-sm">Goal<br><input data-pf="${key}.goal" value="${escapeHtml(p.goal)}" class="w-full mt-1 px-3 py-2 border border-stone-300 rounded-md"></label>
        <label class="block text-sm">Daily kcal target<br><input data-pf="${key}.kcalTarget" type="number" value="${p.kcalTarget}" class="w-full mt-1 px-3 py-2 border border-stone-300 rounded-md"></label>
        <label class="block text-sm">Daily protein target (g)<br><input data-pf="${key}.proteinTarget" type="number" value="${p.proteinTarget}" class="w-full mt-1 px-3 py-2 border border-stone-300 rounded-md"></label>
        <label class="block text-sm">Carb range low (g)<br><input data-pf="${key}.carbRangeLow" type="number" value="${p.carbRangeLow}" class="w-full mt-1 px-3 py-2 border border-stone-300 rounded-md"></label>
        <label class="block text-sm">Carb range high (g)<br><input data-pf="${key}.carbRangeHigh" type="number" value="${p.carbRangeHigh}" class="w-full mt-1 px-3 py-2 border border-stone-300 rounded-md"></label>
        <label class="block text-sm md:col-span-2">Notes / preferences<br><textarea data-pf="${key}.notes" rows="2" class="w-full mt-1 px-3 py-2 border border-stone-300 rounded-md">${escapeHtml(p.notes)}</textarea></label>
      </div>
    </section>
  `;
}

function readProfile(k) {
  const get = (field) => {
    const el = document.querySelector(`[data-pf="${k}.${field}"]`);
    return el ? el.value : '';
  };
  return {
    name: get('name'),
    weightLbs: Number(get('weightLbs')) || 0,
    gender: state.profiles[k].gender,
    activity: get('activity'),
    goal: get('goal'),
    kcalTarget: Number(get('kcalTarget')) || 0,
    proteinTarget: Number(get('proteinTarget')) || 0,
    carbRangeLow: Number(get('carbRangeLow')) || 0,
    carbRangeHigh: Number(get('carbRangeHigh')) || 0,
    notes: get('notes'),
  };
}

/* ========================================================================== */
/*  VIEW: GENERATE                                                            */
/* ========================================================================== */
function renderGenerate(root) {
  const lastPrompt = state.lastGeneration?.prompt || '';
  root.innerHTML = `
    <div class="space-y-5">
      <header>
        <h2 class="text-2xl font-semibold">Generate meal ideas</h2>
        <p class="text-stone-600 mt-1">Describe what kind of menu you want this week. Claude returns 5 breakfasts, 5 lunches, 5 dinners, and 5 snacks tailored to both profiles.</p>
      </header>

      <section class="bg-white p-5 rounded-lg border border-stone-200">
        <label class="block text-sm font-medium mb-1">Menu prompt</label>
        <textarea id="prompt" rows="5" placeholder="e.g., Mediterranean theme this week, big batch prep on Sunday. Lean toward bowls and sheet-pan dinners. Include one breakfast that travels well."
          class="w-full px-3 py-2 border border-stone-300 rounded-md text-sm">${escapeHtml(lastPrompt)}</textarea>
        <div class="flex flex-wrap gap-2 mt-3">
          <button class="quick-prompt text-xs px-3 py-1 bg-stone-100 hover:bg-stone-200 rounded-full">Mediterranean</button>
          <button class="quick-prompt text-xs px-3 py-1 bg-stone-100 hover:bg-stone-200 rounded-full">Tex-Mex bowls</button>
          <button class="quick-prompt text-xs px-3 py-1 bg-stone-100 hover:bg-stone-200 rounded-full">Asian-inspired</button>
          <button class="quick-prompt text-xs px-3 py-1 bg-stone-100 hover:bg-stone-200 rounded-full">Sheet-pan & one-pot</button>
          <button class="quick-prompt text-xs px-3 py-1 bg-stone-100 hover:bg-stone-200 rounded-full">Comfort food, lighter</button>
        </div>
        <div class="mt-4 flex items-center gap-3">
          <button id="generate-btn" class="px-5 py-2.5 bg-emerald-700 text-white rounded-md font-medium hover:bg-emerald-800 disabled:opacity-60">Generate meals</button>
          <span id="gen-status" class="text-sm text-stone-600"></span>
        </div>
        ${!state.apiKey ? `<p class="mt-3 text-sm text-amber-700">No API key set. <a href="#setup" class="underline">Add one in Setup</a> first.</p>` : ''}
      </section>

      <div id="results"></div>
    </div>
  `;

  document.querySelectorAll('.quick-prompt').forEach((btn) => {
    btn.onclick = () => {
      const ta = document.getElementById('prompt');
      ta.value = (ta.value ? ta.value + ' ' : '') + btn.textContent + '.';
    };
  });

  document.getElementById('generate-btn').onclick = onGenerate;

  // If we already have a generation cached, show it
  if (state.lastGeneration) {
    renderResults(state.lastGeneration.meals);
  }
}

async function onGenerate() {
  const promptEl = document.getElementById('prompt');
  const statusEl = document.getElementById('gen-status');
  const btn = document.getElementById('generate-btn');
  const userPrompt = promptEl.value.trim();
  if (!state.apiKey) { toast('Set an API key in Setup'); return; }
  if (!userPrompt) { toast('Enter a prompt'); return; }

  btn.disabled = true;
  statusEl.innerHTML = `<span class="inline-block animate-pulse">Calling Claude…</span> <span class="text-stone-400">(typically 20-40s)</span>`;

  try {
    const result = await callClaudeForMeals(userPrompt);
    state.lastGeneration = {
      prompt: userPrompt,
      timestamp: Date.now(),
      meals: result,
    };
    // Reset picks when re-generating
    state.picks = { breakfast: [], lunch: [], dinner: [], snack: [] };
    saveState();
    statusEl.textContent = 'Done.';
    renderResults(result);
  } catch (e) {
    console.error(e);
    statusEl.innerHTML = `<span class="text-red-700">Error: ${escapeHtml(e.message)}</span>`;
  } finally {
    btn.disabled = false;
  }
}

function renderResults(meals) {
  const root = document.getElementById('results');
  if (!root) return;
  const order = [
    ['breakfast', 'Breakfast', '☕'],
    ['lunch', 'Lunch', '🥙'],
    ['dinner', 'Dinner', '🍽️'],
    ['snack', 'Snacks', '🍎'],
  ];
  root.innerHTML = `
    <div class="space-y-6 mt-2">
      ${order.map(([key, label, emoji]) => `
        <section>
          <h3 class="text-lg font-semibold mb-3">${emoji} ${label}</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            ${(meals[key] || []).map((m) => mealCard(m, key, /*pickable=*/false)).join('')}
          </div>
        </section>
      `).join('')}
      <div class="pt-4 border-t border-stone-200">
        <button id="go-pick" class="px-5 py-2.5 bg-emerald-700 text-white rounded-md font-medium hover:bg-emerald-800">Next: pick my top 3 in each category →</button>
      </div>
    </div>
  `;
  const go_pick = document.getElementById('go-pick');
  if (go_pick) go_pick.onclick = () => go('picks');
}

/* ========================================================================== */
/*  MEAL CARD                                                                 */
/* ========================================================================== */
function mealCard(m, category, pickable, isPicked) {
  const macros = m.macrosPerServing || {};
  const ringClass = pickable && isPicked ? 'ring-2 ring-emerald-500 bg-emerald-50' : 'bg-white';
  const checkboxHtml = pickable
    ? `<label class="flex items-center gap-2 cursor-pointer">
         <input type="checkbox" data-pick="${m.id}" data-cat="${category}" ${isPicked ? 'checked' : ''} class="w-5 h-5 accent-emerald-600">
         <span class="text-sm font-medium">${isPicked ? 'Picked' : 'Pick this'}</span>
       </label>`
    : '';
  const linkHtml = m.recipeUrl
    ? `<a href="${escapeHtml(m.recipeUrl)}" target="_blank" rel="noopener" class="text-sm text-emerald-700 underline">Recipe link ↗</a>`
    : '';
  const addonHtml = m.carbAddon
    ? `<div class="mt-2 text-xs text-stone-600 italic">+ optional carb add-on: ${escapeHtml(m.carbAddon.amount)} ${escapeHtml(m.carbAddon.unit)} ${escapeHtml(m.carbAddon.item)} (+${m.carbAddon.macros?.kcal||0} kcal)</div>`
    : '';

  return `
    <article class="rounded-lg border border-stone-200 ${ringClass} p-4 shadow-sm">
      <div class="flex items-start justify-between gap-3">
        <div>
          <h4 class="font-semibold text-base">${escapeHtml(m.name)}</h4>
          <p class="text-sm text-stone-600 mt-0.5">${escapeHtml(m.description || '')}</p>
        </div>
        ${checkboxHtml}
      </div>
      <div class="mt-2 flex flex-wrap gap-2 macro text-xs">
        <span class="pill bg-stone-100 text-stone-700">${macros.kcal || '?'} kcal</span>
        <span class="pill bg-rose-100 text-rose-800">${macros.protein || '?'}g P</span>
        <span class="pill bg-amber-100 text-amber-800">${macros.carbs || '?'}g C</span>
        <span class="pill bg-yellow-100 text-yellow-800">${macros.fat || '?'}g F</span>
        <span class="pill bg-emerald-100 text-emerald-800">batch of ${m.servings || '?'}</span>
      </div>
      ${addonHtml}
      <details class="mt-3">
        <summary class="text-sm font-medium text-emerald-700 hover:text-emerald-900">Show ingredients & recipe</summary>
        <div class="mt-2 text-sm space-y-2">
          <div>
            <div class="font-medium text-stone-700">Ingredients (for batch of ${m.servings || '?'}):</div>
            <ul class="list-disc list-inside text-stone-700">
              ${(m.ingredients || []).map((i) => `<li>${escapeHtml(i.amount)} ${escapeHtml(i.unit)} ${escapeHtml(i.item)}${i.notes ? ' <span class="text-stone-500">('+escapeHtml(i.notes)+')</span>' : ''}</li>`).join('')}
            </ul>
          </div>
          <div>
            <div class="font-medium text-stone-700">Instructions:</div>
            <div class="text-stone-700 recipe-body">${escapeHtml(m.instructions || '')}</div>
          </div>
          ${m.prepNotes ? `<div class="text-stone-600 italic">Prep tip: ${escapeHtml(m.prepNotes)}</div>` : ''}
          ${linkHtml ? `<div>${linkHtml}</div>` : ''}
        </div>
      </details>
    </article>
  `;
}

/* ========================================================================== */
/*  CLAUDE API CALL                                                           */
/* ========================================================================== */
async function callClaudeForMeals(userPrompt) {
  const pA = state.profiles.a, pB = state.profiles.b;
  const sys = `You are a meal prep planning assistant for a couple who prep meals in bulk once a week.

You must output ONLY a valid JSON object — no prose, no markdown fences, no explanation. The JSON object must match this schema EXACTLY:

{
  "breakfast": [ Meal, Meal, Meal, Meal, Meal ],
  "lunch":     [ Meal, Meal, Meal, Meal, Meal ],
  "dinner":    [ Meal, Meal, Meal, Meal, Meal ],
  "snack":     [ Meal, Meal, Meal, Meal, Meal ]
}

Where each Meal is:
{
  "name": "short descriptive name",
  "description": "1-2 sentence description",
  "servings": <int batch size, typically 4-6 for breakfast/lunch/dinner, 1 for snacks>,
  "ingredients": [
    { "item": "lowercase ingredient name", "amount": <number>, "unit": "cup|tbsp|tsp|oz|lb|g|ml|whole|clove|pinch|...", "aisle": "produce|meat|seafood|dairy|eggs|pantry|bakery|frozen|condiments|spices|other", "notes": "optional, e.g. 'boneless skinless'" }
  ],
  "instructions": "Step-by-step instructions as one string with numbered steps separated by newlines.",
  "prepNotes": "1 sentence tip for bulk meal-prepping or storing this dish",
  "macrosPerServing": { "kcal": <int>, "protein": <int g>, "carbs": <int g>, "fat": <int g> },
  "carbAddon": null  OR  { "item": "...", "amount": <number>, "unit": "...", "macros": { "kcal":<int>, "protein":<int>, "carbs":<int>, "fat":<int> } },
  "recipeUrl": null  OR  "https://full-url-to-real-public-recipe.com/..."
}

Rules:
- "amount" must be a number (use 0.25, 0.5 etc. for fractions; never strings like "1/4").
- Provide a "carbAddon" on at least 3 of the 5 lunches and 3 of the 5 dinners so the lower-carb-aversion partner can bulk up their portion. Breakfasts may have add-ons too where it makes sense (e.g., toast, fruit, oats).
- For "recipeUrl": only include a URL if you have HIGH CONFIDENCE the URL is real and current. If unsure, set to null. Do NOT fabricate URLs. The full recipe should be in "instructions" so the URL is supplementary.
- Macros must be reasonable and consistent with ingredient amounts.
- Snacks should be simple, ~150-350 kcal per serving, listed individually (1 serving each).
- Vary cuisines and techniques across the 5 in each category unless the user prompt requests a specific theme.
- Optimize for bulk meal prep: dishes that hold up 3-5 days refrigerated.
- All quantities are TOTAL for the batch (servings × per-serving). Be careful: if servings=5, list 5×per-serving in ingredients.

Output the JSON object and NOTHING ELSE.`;

  const userMsg = `Generate this week's meal plan options.

PERSON A: ${pA.name}
- ${pA.weightLbs} lbs, ${pA.gender}
- ${pA.activity}
- Goal: ${pA.goal}
- Daily targets: ~${pA.kcalTarget} kcal, ~${pA.proteinTarget}g protein, carbs ${pA.carbRangeLow}-${pA.carbRangeHigh}g
- Notes: ${pA.notes}

PERSON B: ${pB.name}
- ${pB.weightLbs} lbs, ${pB.gender}
- ${pB.activity}
- Goal: ${pB.goal}
- Daily targets: ~${pB.kcalTarget} kcal, ~${pB.proteinTarget}g protein, carbs ${pB.carbRangeLow}-${pB.carbRangeHigh}g
- Notes: ${pB.notes}

GENERAL STYLE NOTES: ${state.styleNotes || '(none)'}

THIS WEEK'S MENU REQUEST: ${userPrompt}

Aim the per-serving macros at Person A's per-meal needs (~1/4 daily kcal for breakfast/lunch/dinner each, snacks ~200 kcal). Person B will eat a smaller portion of the same meal. Use the carbAddon field so Person B can add e.g. rice, tortilla, or fruit without changing the base recipe.

Return ONLY the JSON.`;

  const body = {
    model: state.model || 'claude-sonnet-4-5',
    max_tokens: 16000,
    system: sys,
    messages: [{ role: 'user', content: userMsg }],
  };

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`API ${res.status}: ${txt.slice(0, 400)}`);
  }
  const json = await res.json();
  const text = (json.content && json.content[0] && json.content[0].text) || '';
  const parsed = extractJson(text);
  if (!parsed) throw new Error('Could not parse JSON from Claude response. First 200 chars: ' + text.slice(0, 200));

  // Stamp ids onto each meal
  ['breakfast','lunch','dinner','snack'].forEach((cat) => {
    if (!Array.isArray(parsed[cat])) parsed[cat] = [];
    parsed[cat].forEach((m) => { m.id = uid(); m.category = cat; });
  });
  return parsed;
}

function extractJson(text) {
  // Try direct parse first
  try { return JSON.parse(text); } catch {}
  // Strip code fences
  const fenced = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenced) {
    try { return JSON.parse(fenced[1]); } catch {}
  }
  // Find first { ... last } and try
  const first = text.indexOf('{');
  const last = text.lastIndexOf('}');
  if (first >= 0 && last > first) {
    try { return JSON.parse(text.slice(first, last + 1)); } catch {}
  }
  return null;
}

function decodeShare(d) {
  try {

function aggregateShoppingList(fp) {
  const groups = {}; // aisle -> [{ item, unit, amount }]
  const totalMacros = {
    a: { kcal:0, protein:0, carbs:0, fat:0 },
    b: { kcal:0, protein:0, carbs:0, fat:0 },
  };
  const selectedMeals = [];

  const addIng = (item, amount, unit, aisle) => {
    aisle = (aisle || 'other').toLowerCase();
    item = (item || '').toLowerCase().trim();
    unit = (unit || '').toLowerCase().trim();
    if (!item || !Number.isFinite(amount)) return;
    if (!groups[aisle]) groups[aisle] = [];
    const existing = groups[aisle].find((x) => x.item === item && x.unit === unit);
    if (existing) existing.amount += amount;
    else groups[aisle].push({ item, unit, amount });
  };

  const allMeals = []
    .concat(fp.picks.breakfast || [])
    .concat(fp.picks.lunch || [])
    .concat(fp.picks.dinner || [])
    .concat(fp.picks.snack || []);

  allMeals.forEach((m) => {
    const sel = fp.selections[m.id];
    if (!sel || !sel.selected) return;
    selectedMeals.push(m);
    const servingsTotal = (sel.servingsA || 0) + (sel.servingsB || 0);
    const batchServings = Math.max(1, m.servings || 1);
    const scale = servingsTotal / batchServings; // multiplier on the recipe-as-written

    (m.ingredients || []).forEach((i) => {
      const amt = Number(i.amount) || 0;
      addIng(i.item, amt * scale, i.unit, i.aisle);
    });

    // Carb addons (per serving × that person's servings)
    if (m.carbAddon) {
      const addonServings = (sel.addonForA ? sel.servingsA : 0) + (sel.addonForB ? sel.servingsB : 0);
      if (addonServings > 0) {
        const a = m.carbAddon;
        addIng(a.item, (Number(a.amount) || 0) * addonServings, a.unit, 'pantry');
      }
    }

    // Accumulate macros
    const macros = m.macrosPerServing || {};
    ['kcal','protein','carbs','fat'].forEach((k) => {
      totalMacros.a[k] += (macros[k] || 0) * (sel.servingsA || 0);
      totalMacros.b[k] += (macros[k] || 0) * (sel.servingsB || 0);
    });
    if (m.carbAddon && m.carbAddon.macros) {
      const am = m.carbAddon.macros;
      ['kcal','protein','carbs','fat'].forEach((k) => {
        if (sel.addonForA) totalMacros.a[k] += (am[k] || 0) * (sel.servingsA || 0);
        if (sel.addonForB) totalMacros.b[k] += (am[k] || 0) * (sel.servingsB || 0);
      });
    }
  });

  // Sort each aisle alphabetically
  Object.keys(groups).forEach((a) => groups[a].sort((x, y) => x.item.localeCompare(y.item)));

  return { groups, totalMacros, selectedMeals };
}

function buildInstacartText(orderedGroups) {
  const lines = [];
  orderedGroups.forEach(([aisle, items]) => {
    items.forEach((it) => {
      const amt = it.unit === 'whole' || it.unit === '' ? round(it.amount, 1) : round(it.amount, 2);
      lines.push(`${amt} ${it.unit} ${it.item}`.trim());
    });
  });
  return lines.join('\n');
}
